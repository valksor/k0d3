name: MCP guard

on:
  push:
    branches: [master]
    paths:
      - ".mcp.json"
      - "scripts/smoke-mcp-memory.sh"
      - "scripts/smoke-mcp-sequentialthinking.sh"
      - "scripts/smoke-mcp-codegraph.sh"
      - "scripts/test-prefer-codegraph.sh"
      - "scripts/test-allow-codegraph.sh"
      - "hooks/codegraph-autoindex.sh"
      - "hooks/prefer-codegraph.sh"
      - "hooks/allow-codegraph.sh"
      - "hooks/hooks.json"
      - ".mcp.codex.json"
      - ".codex-plugin/plugin.json"
      - ".agents/plugins/marketplace.json"
      - "hooks/codex-hooks-shim.sh"
      - "scripts/install-codex-hooks.sh"
      - "scripts/test-codex.sh"
      - "hooks/hooks.codex.json"
      - "hooks/verify-before-stop.sh"
      - "scripts/generate-codex-hooks.sh"
      - "scripts/generate-codex-skill-manifests.sh"
      - "scripts/_generate_codex_skill_manifests.py"
      - "skills/**/agents/openai.yaml"
      - ".github/workflows/mcp-guard.yml"
  pull_request:
    paths:
      - ".mcp.json"
      - "scripts/smoke-mcp-memory.sh"
      - "scripts/smoke-mcp-sequentialthinking.sh"
      - "scripts/smoke-mcp-codegraph.sh"
      - "scripts/test-prefer-codegraph.sh"
      - "scripts/test-allow-codegraph.sh"
      - "hooks/codegraph-autoindex.sh"
      - "hooks/prefer-codegraph.sh"
      - "hooks/allow-codegraph.sh"
      - "hooks/hooks.json"
      - ".mcp.codex.json"
      - ".codex-plugin/plugin.json"
      - ".agents/plugins/marketplace.json"
      - "hooks/codex-hooks-shim.sh"
      - "scripts/install-codex-hooks.sh"
      - "scripts/test-codex.sh"
      - "hooks/hooks.codex.json"
      - "hooks/verify-before-stop.sh"
      - "scripts/generate-codex-hooks.sh"
      - "scripts/generate-codex-skill-manifests.sh"
      - "scripts/_generate_codex_skill_manifests.py"
      - "skills/**/agents/openai.yaml"
      - ".github/workflows/mcp-guard.yml"
  schedule:
    # Daily — the bundled servers track npm `latest` (unpinned), so a daily smoke catches
    # an upstream release that breaks launch (a canary) before users hit it.
    - cron: "17 6 * * *"
  workflow_dispatch:

# Least privilege: this job only reads the repo and queries npm — no writes.
permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-slim
    # codegraph's vendored-Node bundle is a heavier first fetch than the
    # @modelcontextprotocol servers, so the job needs more than the default headroom.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Smoke — memory (self-init + path resolution)
        run: bash scripts/smoke-mcp-memory.sh

      - name: Smoke — sequential-thinking (launch + tool result)
        run: bash scripts/smoke-mcp-sequentialthinking.sh

      - name: Smoke — codegraph (launch + advertises tools)
        run: bash scripts/smoke-mcp-codegraph.sh

      - name: Test — prefer-codegraph Grep nudge
        run: bash scripts/test-prefer-codegraph.sh

      - name: Test — allow-codegraph auto-approve
        run: bash scripts/test-allow-codegraph.sh

      - name: Test — Codex integration (manifests, MCP, derived hooks, guard behavior)
        run: bash scripts/test-codex.sh
