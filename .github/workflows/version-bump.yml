name: Version Bump

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  version-bump:
    runs-on: ubuntu-slim
    if: github.actor != 'github-actions[bot]'
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Determine bump type
        id: bump_type
        env:
          # Via env, not interpolation — commit messages with special chars won't break the shell
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MSG" =~ \[major\] ]]; then
            echo "BUMP_TYPE=major" >> $GITHUB_OUTPUT
          elif [[ "$COMMIT_MSG" =~ \[minor\] ]]; then
            echo "BUMP_TYPE=minor" >> $GITHUB_OUTPUT
          else
            echo "BUMP_TYPE=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(jq -r '.version' .claude-plugin/plugin.json)
          [[ "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Bad version: $CURRENT"; exit 1; }
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ steps.bump_type.outputs.BUMP_TYPE }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            *)     PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "Bumping $CURRENT -> $NEW_VERSION"

          jq --arg v "$NEW_VERSION" '.version = $v' .claude-plugin/plugin.json > /tmp/plugin.json
          mv /tmp/plugin.json .claude-plugin/plugin.json

          jq --arg v "$NEW_VERSION" '(.plugins[] | select(.name == "k0d3") | .version) = $v' \
            .claude-plugin/marketplace.json > /tmp/marketplace.json
          mv /tmp/marketplace.json .claude-plugin/marketplace.json

          # Fail loud if the marketplace entry didn't actually update
          MP_VERSION=$(jq -r '.plugins[] | select(.name == "k0d3") | .version' .claude-plugin/marketplace.json)
          [[ "$MP_VERSION" == "$NEW_VERSION" ]] || { echo "marketplace.json not synced: $MP_VERSION != $NEW_VERSION"; exit 1; }

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "Bump version to ${{ steps.bump.outputs.NEW_VERSION }} [skip ci]"
          git pull --rebase origin master
          git push origin HEAD:master
